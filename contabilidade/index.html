<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treador de Teoria Contábil</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2, h3 { color: #2c3e50; margin-top: 0; }
        .section {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .control-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
        }
        select, button {
            padding: 10px 15px;
            font-size: 15px;
            border-radius: 5px;
            border: 1px solid #bdc3c7;
            cursor: pointer;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #2980b9; }
        button.btn-success { background-color: #2ecc71; }
        button.btn-success:hover { background-color: #27ae60; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            margin-bottom: 15px;
            background: #fff;
        }
        th, td {
            border: 1px solid #dcdde1;
            padding: 10px 12px;
            text-align: left;
        }
        th { background-color: #f5f6fa; color: #2c3e50; }
        .text-right { text-align: right; }
        .resultado-box {
            background-color: #e8f4f8;
            border-left: 5px solid #3498db;
            padding: 15px;
            margin-top: 15px;
            font-size: 16px;
            line-height: 1.6;
        }
        .badge {
            background-color: #e74c3c;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gerador de Exercícios Teóricos</h1>
    <p>Treine a estrutura das demonstrações com números pequenos. Atenção: algumas contas geradas não possuem impacto no resultado solicitado!</p>
    
    <div class="section">
        <h3>Configurar Nova Questão</h3>
        <div class="control-group">
            <div>
                <label><strong>Tipo:</strong></label><br>
                <select id="tipoDemonstracao">
                    <option value="dre">DRE (Apuração do Lucro Bruto)</option>
                    <option value="dva">DVA (Valor Adicionado Gerado e Pessoal)</option>
                </select>
            </div>
            <div>
                <label><strong>Dificuldade (Contas Intrusas):</strong></label><br>
                <select id="nivelDificuldade">
                    <option value="facil">Fácil (Apenas as contas necessárias)</option>
                    <option value="medio">Médio (+2 contas intrusas sem impacto)</option>
                    <option value="dificil">Difícil (+4 contas intrusas sem impacto)</option>
                </select>
            </div>
        </div>
        <button onclick="gerarQuestaoTeorica()" class="btn-success">Gerar Nova Questão</button>
    </div>

    <div id="areaQuestao" style="display:none;">
        <h2 id="tituloQuestao">Demonstração</h2>
        <p id="enunciadoQuestao"></p>
        
        <table id="tabelaContas">
            <thead>
                <tr>
                    <th>Conta Contábil</th>
                    <th class="text-right">Valor</th>
                </tr>
            </thead>
            <tbody id="corpoTabelaContas"></tbody>
        </table>

        <button onclick="revelarResposta()">Verificar Resposta / Resolução</button>
        <div id="areaResposta"></div>
    </div>
</div>

<script>
let questaoAtual = null;

// Banco de contas falsas (intrusas) que NÃO afetam o Lucro Bruto (na DRE) nem o Valor Adicionado/Pessoal (na DVA)
const contasIntrusasDisponiveis = [
    { conta: "Caixa e Equivalentes de Caixa", valor: 150, obs: "Conta Patrimonial (Ativo)" },
    { conta: "Capital Social Subscrito", valor: 500, obs: "Conta Patrimonial (Patrimônio Líquido)" },
    { conta: "Fornecedores Nacionais", valor: 85, obs: "Conta Patrimonial (Passivo Circulante)" },
    { conta: "Empréstimos Bancários de Longo Prazo", valor: 200, obs: "Conta Patrimonial (Passivo Não Circulante)" },
    { conta: "Aplicações Financeiras", valor: 60, obs: "Conta Patrimonial (Ativo)" },
    { conta: "Dividendos Propostos a Pagar", valor: 45, obs: "Conta Patrimonial (Passivo)" }
];

function r(min, max) {
    return Math.floor(Math.random() * (max - min + 1) + min);
}

function gerarQuestaoTeorica() {
    const tipo = document.getElementById("tipoDemonstracao").value;
    const dificuldade = document.getElementById("nivelDificuldade").value;
    
    document.getElementById("areaResposta").innerHTML = ""; // Limpa resposta anterior
    document.getElementById("areaQuestao").style.display = "block";

    let contasBase = [];
    let solucaoExplicada = {};

    if (tipo === 'dre') {
        // 1. Definição dos valores base da DRE (Sempre inteiros e pequenos)
        const rb = r(50, 90);
        const impostos = r(2, 4) * 2; // Força par para facilitar se houver divisão
        const devolucoes = r(2, 5);
        const cmv = r(15, 30);
        
        // Despesas operacionais que NÃO entram no cálculo do Lucro Bruto (Apenas Intrusas de Resultado)
        const despesaPropaganda = r(3, 8);
        const despesaFinanceira = r(2, 6);

        contasBase = [
            { conta: "Receita Bruta de Vendas", valor: rb, afeta: true, tag: "RB" },
            { conta: "Impostos Incidentes sobre Vendas", valor: impostos, afeta: true, tag: "DED" },
            { conta: "Devoluções de Vendas", valor: devolucoes, afeta: true, tag: "DED" },
            { conta: "Custo das Mercadorias Vendidas (CMV)", valor: cmv, afeta: true, tag: "CMV" },
            { conta: "Despesas com Propaganda e Marketing", valor: despesaPropaganda, afeta: false, tag: "OPER" },
            { conta: "Despesas Financeiras Líquidas", valor: despesaFinanceira, afeta: false, tag: "FIN" }
        ];

        // Cálculo da resolução teórica
        const deducoes = impostos + devolucoes;
        const receitaLiquida = rb - deducoes;
        const lucroBruto = receitaLiquida - cmv;

        solucaoExplicada = {
            tipo: "DRE",
            texto: `
                <strong>Resolução Passo a Passo (Lucro Bruto):</strong><br>
                • Receita Bruta: R$ ${rb}<br>
                • (–) Deduções (Impostos [R$ ${impostos}] + Devoluções [R$ ${devolucoes}]): R$ ${deducoes}<br>
                • (=) Receita Líquida: R$ ${receitaLiquida}<br>
                • (–) Custo das Mercadorias Vendidas (CMV): R$ ${cmv}<br>
                <strong>👉 LUCRO BRUTO = R$ ${lucroBruto}</strong><br><br>
                <small>*Nota Teórica: As despesas com propaganda e despesas financeiras são operacionais/financeiras, vindo após o Lucro Bruto. Portanto, não têm impacto aqui.*</small>
            `
        };
        
        document.getElementById("tituloQuestao").innerText = "Exercício de Estrutura: DRE";
        document.getElementById("enunciadoQuestao").innerText = "Com base exclusivamente nas contas fornecidas, calcule o valor do Lucro Bruto.";

    } else if (tipo === 'dva') {
        // 2. Definição dos valores base da DVA
        const rb = r(60, 100);
        const cmv = r(20, 40);
        const salarios = r(1, 3) * 10; // 10, 20 ou 30
        const encargos = salarios * 0.3; // Garante inteiro redondo
        const depreciacao = r(2, 6);
        
        // Contas que NÃO afetam o Valor Adicionado Gerado nem Pessoal (Apenas Intrusas de Resultado)
        const receitaEquivPatrimonial = r(5, 12); 

        contasBase = [
            { conta: "Receita Bruta de Vendas (DVA)", valor: rb, afeta: true, tag: "DVA_REC" },
            { conta: "Insumos Adquiridos de Terceiros (CMV)", valor: cmv, afeta: true, tag: "DVA_INS" },
            { conta: "Depreciação do Período", valor: depreciacao, afeta: true, tag: "DVA_RET" },
            { conta: "Gastos com Salários de Funcionários", valor: salarios, afeta: true, tag: "DVA_PES" },
            { conta: "Encargos Sociais sobre a Folha (INSS/FGTS)", valor: encargos, afeta: true, tag: "DVA_PES" },
            { conta: "Receita de Equivalência Patrimonial", valor: receitaEquivPatrimonial, afeta: false, tag: "DVA_RECEBIDA" }
        ];

        const valorAdicionadoBruto = rb - cmv;
        const valorAdicionadoGerado = valorAdicionadoBruto - depreciacao;
        const totalPessoal = salarios + encargos;

        solucaoExplicada = {
            tipo: "DVA",
            texto: `
                <strong>Resolução Passo a Passo (DVA):</strong><br>
                • 1) Receitas (Vendas): R$ ${rb}<br>
                • 2) (–) Insumos de Terceiros (CMV): R$ ${cmv}<br>
                • (=) Valor Adicionado Bruto: R$ ${valorAdicionadoBruto}<br>
                • 3) (–) Retenções (Depreciação): R$ ${depreciacao}<br>
                <strong>👉 VALOR ADICIONADO GERADO TOTAL = R$ ${valorAdicionadoGerado}</strong><br><br>
                <strong>Distribuição desse valor para Pessoal:</strong><br>
                • Salários [R$ ${salarios}] + Encargos [R$ ${encargos}]<br>
                <strong>👉 PARCELA DESTINADA A PESSOAL = R$ ${totalPessoal}</strong><br><br>
                <small>*Nota Teórica: A Equivalência Patrimonial entra na linha de 'Valor Adicionado Recebido em Transferência', logo, não faz parte do Valor Adicionado GERADO pela própria entidade.*</small>
            `
        };

        document.getElementById("tituloQuestao").innerText = "Exercício de Estrutura: DVA";
        document.getElementById("enunciadoQuestao").innerText = "Com base nas regras da NBC TG 09, determine: 1) O Valor Adicionado Gerado pela empresa e 2) A parcela distribuída para Pessoal.";
    }

    // 3. Adicionar Contas Patrimoniais Intrusas com base na dificuldade
    let quantidadeIntrusas = 0;
    if (dificuldade === "medio") quantidadeIntrusas = 2;
    if (dificuldade === "dificil") quantidadeIntrusas = 4;

    // Embaralha e pinça do banco de intrusas patrimoniais
    const intrusasSelecionadas = [...contasIntrusasDisponiveis]
        .sort(() => 0.5 - Math.random())
        .slice(0, quantidadeIntrusas)
        .map(item => ({ ...item, afeta: false, tag: "INTRUSA_PATRIMONIAL" }));

    // Consolida e reordena todas as contas aleatoriamente para exibição na tabela
    const listaExibicaoFinal = [...contasBase, ...intrusasSelecionadas]
        .sort(() => 0.5 - Math.random());

    questaoAtual = {
        contas: listaExibicaoFinal,
        solucao: solucaoExplicada
    };

    // 4. Renderiza a tabela HTML
    const tbody = document.getElementById("corpoTabelaContas");
    tbody.innerHTML = "";
    
    listaExibicaoFinal.forEach(item => {
        tbody.innerHTML += `
            <tr>
                <td>${item.conta}</td>
                <td class="text-right">R$ ${item.valor},00</td>
            </tr>
        `;
    });
}

function revelarResposta() {
    if (!questaoAtual) return;
    
    let htmlIntrusas = "<h4>Análise das Contas Sem Impacto Neste Cálculo:</h4><ul>";
    let houveIntrusa = false;

    questaoAtual.contas.forEach(item => {
        if (!item.afeta) {
            houveIntrusa = true;
            let motivo = item.tag === "INTRUSA_PATRIMONIAL" ? "Conta de Balanço Patrimonial (não vai para DRE/DVA)" : "Aparece na demonstração, mas fora do grupo solicitado";
            htmlIntrusas += `<li><strong>${item.conta}</strong> (R$ ${item.valor}) <span class="badge">Sem impacto</span><br><small>Motivo: ${motivo}.</small></li>`;
        }
    });
    
    if(!houveIntrusa) htmlIntrusas += "<li>Nenhuma conta intrusa gerada neste nível.</li>";
    htmlIntrusas += "</ul>";

    document.getElementById("areaResposta").innerHTML = `
        <div class="resultado-box">
            ${questaoAtual.solucao.texto}
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">
            ${htmlIntrusas}
        </div>
    `;
}
</script>

</body>
</html>
