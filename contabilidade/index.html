<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treador de Teoria Contábil</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2, h3 { color: #2c3e50; margin-top: 0; }
        .section {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .control-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
        }
        select, button {
            padding: 10px 15px;
            font-size: 15px;
            border-radius: 5px;
            border: 1px solid #bdc3c7;
            cursor: pointer;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #2980b9; }
        button.btn-success { background-color: #2ecc71; }
        button.btn-success:hover { background-color: #27ae60; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            margin-bottom: 15px;
            background: #fff;
        }
        th, td {
            border: 1px solid #dcdde1;
            padding: 10px 12px;
            text-align: left;
        }
        th { background-color: #f5f6fa; color: #2c3e50; }
        .text-right { text-align: right; }
        .resultado-box {
            background-color: #e8f4f8;
            border-left: 5px solid #3498db;
            padding: 15px;
            margin-top: 15px;
            font-size: 16px;
            line-height: 1.6;
        }
        .badge {
            background-color: #e74c3c;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gerador de Exercícios Teóricos</h1>
    <p>Treine a estrutura das demonstrações com números pequenos. Atenção: algumas contas geradas não possuem impacto no resultado solicitado!</p>
    
    <div class="section">
        <h3>Configurar Nova Questão</h3>
        <div class="control-group">
            <div>
                <label><strong>Tipo:</strong></label><br>
                <select id="tipoDemonstracao">
                    <option value="dre">DRE (Apuração do Lucro Bruto)</option>
                    <option value="dva">DVA (Valor Adicionado Gerado e Pessoal)</option>
                    <option value="dfc">DFC</option>
                </select>
            </div>
            <div>
                <label><strong>Dificuldade (Contas Intrusas):</strong></label><br>
                <select id="nivelDificuldade">
                    <option value="facil">Fácil (Apenas as contas necessárias)</option>
                    <option value="medio">Médio (+2 contas intrusas sem impacto)</option>
                    <option value="dificil">Difícil (+4 contas intrusas sem impacto)</option>
                </select>
            </div>
        </div>
        <button onclick="gerarQuestaoTeorica()" class="btn-success">Gerar Nova Questão</button>
    </div>

    <div id="areaQuestao" style="display:none;">
        <h2 id="tituloQuestao">Demonstração</h2>
        <p id="enunciadoQuestao"></p>
        
        <table id="tabelaContas">
            <thead>
                <tr>
                    <th>Conta Contábil</th>
                    <th class="text-right">Valor</th>
                </tr>
            </thead>
            <tbody id="corpoTabelaContas"></tbody>
        </table>
        <div id="cronometroQuestao" style="font-weight:bold; margin:10px 0;">
            Tempo: 00:00
        </div>

        <button onclick="revelarResposta()">Verificar Resposta / Resolução</button>
        <div id="areaResposta"></div>
    </div>
</div>

<script src="index.js">
</script>

</body>
</html>
